# Continuous integration: keep main releasable.
# cargo test needs no real Claude - the ken-core runner tests drive a fake
# `claude` shell script and POST hook callbacks with curl, both of which
# are present on GitHub-hosted runners.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Rust tests
        run: cargo test --workspace

      - name: Install frontend dependencies
        run: pnpm install

      - name: Frontend tests
        run: pnpm test

      - name: Type check
        run: pnpm check

      - name: Frontend build
        run: pnpm build
