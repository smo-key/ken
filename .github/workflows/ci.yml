# Continuous integration: keep main releasable.
# cargo test needs no real Claude - the ken-core runner tests drive a fake
# `claude` shell script and POST hook callbacks with curl, both of which
# are present on GitHub-hosted runners.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libasound2-dev \
            libssl-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      # tauri.conf.json declares externalBin binaries/ken-mcp, so ken-app's
      # build script refuses to compile — even for tests — unless the
      # host-triple sidecar file exists.
      - name: Build ken-mcp sidecar
        run: |
          cargo build --release -p ken-mcp
          mkdir -p src-tauri/binaries
          triple=$(rustc -vV | sed -n 's/^host: //p')
          cp target/release/ken-mcp "src-tauri/binaries/ken-mcp-$triple"

      - name: Rust tests
        run: cargo test --workspace

      - name: Install frontend dependencies
        run: pnpm install

      - name: Frontend tests
        run: pnpm test

      - name: Type check
        run: pnpm check

      - name: Frontend build
        run: pnpm build

  # Proves Ken builds for x86_64-pc-windows-msvc: workspace compile with the
  # vulkan ggml backend, plus the NSIS installer via `tauri build`. Rust tests
  # stay on the Ubuntu job — the ken-core runner tests drive a fake `claude`
  # shell script and curl hook callbacks, which are not Windows-portable.
  build-windows:
    runs-on: windows-latest
    env:
      VULKAN_VERSION: "1.4.309.0"
    steps:
      - uses: actions/checkout@v4

      # ggml's Vulkan backend compiles its shaders at build time with glslc,
      # which ships in the LunarG SDK (same install recipe as llama.cpp's CI).
      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          curl.exe -o "$env:RUNNER_TEMP\VulkanSDK-Installer.exe" -L "https://sdk.lunarg.com/sdk/download/$env:VULKAN_VERSION/windows/VulkanSDK-$env:VULKAN_VERSION-Installer.exe"
          & "$env:RUNNER_TEMP\VulkanSDK-Installer.exe" --accept-licenses --default-answer --confirm-command install | Out-Null
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\$env:VULKAN_VERSION"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\$env:VULKAN_VERSION\Bin"

      # The SDK installer's default components ship no SPIRV-Headers CMake
      # config, but ggml's Vulkan backend hard-requires it
      # (find_package(SPIRV-Headers CONFIG REQUIRED)). Install the headers
      # ourselves, pinned to the tag matching the SDK version above.
      - name: Install SPIRV-Headers
        shell: pwsh
        run: |
          git clone --depth 1 --branch "vulkan-sdk-$env:VULKAN_VERSION" https://github.com/KhronosGroup/SPIRV-Headers.git "$env:RUNNER_TEMP\spirv-headers"
          cmake -S "$env:RUNNER_TEMP\spirv-headers" -B "$env:RUNNER_TEMP\spirv-headers\build" -DCMAKE_INSTALL_PREFIX="C:\SPIRV-Headers"
          cmake --install "$env:RUNNER_TEMP\spirv-headers\build"
          Add-Content $env:GITHUB_ENV "CMAKE_PREFIX_PATH=C:\SPIRV-Headers"

      # ggml's vulkan-shaders-gen ExternalProject breaks under the VS 2026
      # generator (MSBuild runs its install rule before the build finishes);
      # build with Ninja instead. Ninja needs cl.exe on PATH, hence
      # msvc-dev-cmd. cmake-rs picks the generator up from CMAKE_GENERATOR.
      - name: Set up MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Select Ninja cmake generator (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Add-Content $env:GITHUB_ENV "CMAKE_GENERATOR=Ninja"

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: pnpm install

      # pwsh, not bash: under Git Bash /usr/bin/link (coreutils) shadows the
      # MSVC linker that the msvc-dev-cmd environment puts on PATH.
      - name: Build ken-mcp sidecar
        shell: pwsh
        run: |
          cargo build --release -p ken-mcp
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          $triple = (rustc -vV | Select-String '^host: (.+)$').Matches[0].Groups[1].Value
          Copy-Item target/release/ken-mcp.exe "src-tauri/binaries/ken-mcp-$triple.exe"

      # createUpdaterArtifacts is enabled in tauri.conf.json, so `tauri build`
      # needs the updater signing key even in CI.
      - name: Build app bundle (NSIS)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

  # Proves Ken builds for aarch64-apple-darwin (Apple Silicon): workspace
  # compile with the metal ggml backend, plus the .app/.dmg bundles via
  # `tauri build` — the same leg release.yml ships. macos-26, not macos-15:
  # apple-metal (via screencapturekit) needs the macOS 26 SDK (e.g.
  # MTLSamplerDescriptor.reductionMode / MTLSamplerReductionMode), which
  # macos-15's default Xcode 16.4 lacks; macos-26's default Xcode 26.x has it.
  build-macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build ken-mcp sidecar
        shell: bash
        run: |
          cargo build --release -p ken-mcp
          mkdir -p src-tauri/binaries
          triple=$(rustc -vV | sed -n 's/^host: //p')
          cp target/release/ken-mcp "src-tauri/binaries/ken-mcp-$triple"

      # createUpdaterArtifacts is enabled in tauri.conf.json, so `tauri build`
      # needs the updater signing key even in CI.
      - name: Build app bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build
